<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pagamentos - Castelie</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="brand">Castelie Cookie Shop</div>
      <nav>
        <a href="/">Produtos</a>
        <a href="/admin">Admin</a>
        <a href="/admin/logout">Sair</a>
      </nav>
    </header>

    <main class="layout" style="grid-template-columns: 1fr;">
      <section class="products">
        <h2>Pagamentos</h2>
        <p>Marque pago, nao pago ou parcial. Tudo salva no GitHub.</p>

        {% if git_message %}
        <div class="card" style="margin-bottom: 12px;">
          <strong>Git:</strong> {{ git_message }}
        </div>
        {% endif %}

        <form method="post" class="form" id="payments-form">
          <div class="payments-toolbar">
            <button type="button" id="add-row">Adicionar linha</button>
          </div>

          <div class="payments-table" id="payments-table"></div>

          <textarea name="payments_json" id="payments-json" rows="6" style="display:none;"></textarea>

          <button type="submit">Salvar pagamentos</button>
          {% if message %}
          <div id="order-status" class="success">{{ message }}</div>
          {% endif %}
        </form>
      </section>
    </main>

    <script>
      const payments = {{ payments_json | safe }};
      const catalog = {{ catalog_json | safe }};
      const table = document.getElementById('payments-table');
      const form = document.getElementById('payments-form');
      const jsonInput = document.getElementById('payments-json');
      const addRowBtn = document.getElementById('add-row');

      const statusOptions = ['Pago', 'Pendente', 'Parcial', 'Nao pago'];
      const catalogMap = new Map(catalog.map((item) => [item.id, item]));

      function buildRow(row) {
        const wrapper = document.createElement('div');
        wrapper.className = 'payments-row';
        wrapper.innerHTML = `
          <input placeholder="Cliente" value="${row.cliente || ''}" data-field="cliente" />
          <select data-field="produto_id"></select>
          <input type="number" step="1" min="1" placeholder="Qtd" value="${row.quantidade || ''}" data-field="quantidade" />
          <input type="number" step="0.1" placeholder="Valor" value="${row.valor || ''}" data-field="valor" readonly />
          <select data-field="situacao"></select>
          <input type="number" step="0.1" placeholder="Valor pago" value="${row.valor_pago || ''}" data-field="valor_pago" />
          <input placeholder="Observacao" value="${row.observacao || ''}" data-field="observacao" />
          <button type="button" class="remove-row">Remover</button>
        `;
        const productSelect = wrapper.querySelector('select[data-field="produto_id"]');
        const qtyInput = wrapper.querySelector('input[data-field="quantidade"]');
        const valorInput = wrapper.querySelector('input[data-field="valor"]');
        const produtoIdAtual = row.produto_id || '';

        const emptyOpt = document.createElement('option');
        emptyOpt.value = '';
        emptyOpt.textContent = 'Selecione produto';
        productSelect.appendChild(emptyOpt);

        catalog.forEach((item) => {
          const option = document.createElement('option');
          option.value = item.id;
          option.textContent = `${item.name} (R$ ${Number(item.price || 0).toFixed(2)})`;
          if (produtoIdAtual === item.id) {
            option.selected = true;
          }
          productSelect.appendChild(option);
        });

        const select = wrapper.querySelector('select');
        statusOptions.forEach((opt) => {
          const option = document.createElement('option');
          option.value = opt;
          option.textContent = opt;
          if ((row.situacao || '').toLowerCase() === opt.toLowerCase()) {
            option.selected = true;
          }
          select.appendChild(option);
        });
        const updateValor = () => {
          const produtoId = productSelect.value;
          const qty = parseInt(qtyInput.value || 0, 10);
          const produto = catalogMap.get(produtoId);
          if (!produto || !qty) {
            return;
          }
          const total = Number(produto.price || 0) * qty;
          valorInput.value = total.toFixed(2);
        };

        productSelect.addEventListener('change', updateValor);
        qtyInput.addEventListener('input', updateValor);

        wrapper.querySelector('.remove-row').addEventListener('click', () => {
          wrapper.remove();
        });
        return wrapper;
      }

      function renderRows() {
        table.innerHTML = '';
        payments.forEach((row) => table.appendChild(buildRow(row)));
      }

      addRowBtn.addEventListener('click', () => {
        table.appendChild(buildRow({}));
      });

      form.addEventListener('submit', () => {
        const rows = Array.from(document.querySelectorAll('.payments-row')).map((row) => {
          const getVal = (field) => row.querySelector(`[data-field="${field}"]`).value;
          const produtoId = getVal('produto_id');
          const produto = catalogMap.get(produtoId);
          return {
            cliente: getVal('cliente'),
            produto_id: produtoId,
            produto_nome: produto ? produto.name : '',
            quantidade: getVal('quantidade'),
            situacao: getVal('situacao'),
            valor: getVal('valor'),
            valor_pago: getVal('valor_pago'),
            observacao: getVal('observacao'),
            sem_recheio: '',
            com_recheio: '',
          };
        });
        jsonInput.value = JSON.stringify(rows, null, 2);
      });

      renderRows();
    </script>
  </body>
</html>
