<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Castelie</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="brand">Castelie Cookie Shop</div>
      <nav>
        <a href="/">Produtos</a>
        <a href="/admin/pagamentos">Pagamentos</a>
      </nav>
    </header>

    <main class="layout" style="grid-template-columns: 1fr;">
      <section class="products">
        <h2>Admin</h2>
        <p>Edite produtos e envie fotos. Tudo fica com tamanho padrao.</p>

        <form method="post" class="form" id="admin-form">
          <label>Senha admin</label>
          <input type="password" name="password" id="admin-password" required />

          <label>Produtos</label>
          <div id="admin-grid" class="grid admin-grid"></div>

          <textarea name="catalog_json" id="catalog-json" rows="10" style="display:none;">{{ catalog_json }}</textarea>

          <button type="submit">Salvar catalogo</button>
          {% if message %}
          <div id="order-status" class="success">{{ message }}</div>
          {% endif %}
        </form>
      </section>
    </main>

    <script>
      const catalog = {{ catalog_json | safe }};
      const grid = document.getElementById('admin-grid');
      const form = document.getElementById('admin-form');
      const jsonInput = document.getElementById('catalog-json');

      function buildCard(item) {
        const card = document.createElement('div');
        card.className = 'card product-card admin-card';
        card.innerHTML = `
          <img src="/static/products/${item.id}.jpg" onerror="this.style.display='none'" />
          <label>Nome</label>
          <input value="${item.name}" data-field="name" />
          <label>Categoria</label>
          <input value="${item.category}" data-field="category" />
          <label>Preco</label>
          <input type="number" step="0.5" value="${item.price}" data-field="price" />
          <label>Tamanho</label>
          <input value="${item.size}" data-field="size" />
          <label>Descricao</label>
          <textarea rows="2" data-field="description">${item.description}</textarea>
          <label>Destaque</label>
          <input value="${item.highlight}" data-field="highlight" />
          <label>Disponivel</label>
          <select data-field="available">
            <option value="true" ${item.available ? 'selected' : ''}>Sim</option>
            <option value="false" ${item.available ? '' : 'selected'}>Nao</option>
          </select>
          <label>Estoque</label>
          <input type="number" step="1" value="${item.stock ?? 0}" data-field="stock" />
          <label>Foto</label>
          <input type="file" data-field="image" accept=".jpg,.jpeg,.png,.webp" />
          <button type="button" class="upload-btn">Enviar foto</button>
        `;

        const uploadBtn = card.querySelector('.upload-btn');
        uploadBtn.addEventListener('click', async () => {
          const password = document.getElementById('admin-password').value;
          const fileInput = card.querySelector('input[data-field="image"]');
          if (!password) {
            alert('Digite a senha admin.');
            return;
          }
          if (!fileInput.files.length) {
            alert('Escolha uma imagem.');
            return;
          }
          const formData = new FormData();
          formData.append('password', password);
          formData.append('product_id', item.id);
          formData.append('image', fileInput.files[0]);

          const resp = await fetch('/admin/upload', { method: 'POST', body: formData });
          const data = await resp.json();
          alert(data.message || (data.ok ? 'Imagem enviada.' : 'Erro ao enviar.'));
        });

        return card;
      }

      function renderAdmin() {
        grid.innerHTML = '';
        catalog.forEach((item) => grid.appendChild(buildCard(item)));
      }

      form.addEventListener('submit', () => {
        const cards = Array.from(document.querySelectorAll('.admin-card'));
        const updated = cards.map((card, idx) => {
          const base = catalog[idx];
          const getVal = (field) => card.querySelector(`[data-field="${field}"]`).value;
          return {
            id: base.id,
            name: getVal('name'),
            category: getVal('category'),
            price: parseFloat(getVal('price') || 0),
            size: getVal('size'),
            description: getVal('description'),
            highlight: getVal('highlight'),
            available: getVal('available') === 'true',
            stock: parseInt(getVal('stock') || 0, 10),
          };
        });
        jsonInput.value = JSON.stringify(updated, null, 2);
      });

      renderAdmin();
    </script>
  </body>
</html>
