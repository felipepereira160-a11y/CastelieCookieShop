<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Castelie</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="brand">Castelie Cookie Shop</div>
      <nav>
        <a href="/">Produtos</a>
      </nav>
    </header>

    <main class="layout" style="grid-template-columns: 1fr;">
      <section class="products">
        <h2>Admin</h2>
        <p>Edite o catalogo em JSON. Ao salvar, os produtos do site sao atualizados.</p>

        <form method="post" class="form">
          <label>Senha admin</label>
          <input type="password" name="password" required />

          <label>Catalogo (JSON)</label>
          <textarea name="catalog_json" rows="18">{{ catalog_json }}</textarea>

          <button type="submit">Salvar catalogo</button>
          {% if message %}
          <div id="order-status" class="success">{{ message }}</div>
          {% endif %}
        </form>
      </section>
    </main>
  </body>
</html>
