services:
  - type: web
    name: castelie-cookie-shop
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
